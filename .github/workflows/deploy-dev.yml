name: Deploy to Dev

on:
  push:
    branches: [develop]

env:
  AWS_REGION:   ap-southeast-1
  PROJECT_NAME: edysup-parkirpintar
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway:      ${{ steps.changes.outputs.gateway }}
      reservation:  ${{ steps.changes.outputs.reservation }}
      billing:      ${{ steps.changes.outputs.billing }}
      payment:      ${{ steps.changes.outputs.payment }}
      presence:     ${{ steps.changes.outputs.presence }}
      notification: ${{ steps.changes.outputs.notification }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'pkg/**'
              - 'gen/**'
            reservation:
              - 'services/reservation/**'
              - 'pkg/**'
              - 'gen/**'
            billing:
              - 'services/billing/**'
              - 'pkg/**'
              - 'gen/**'
            payment:
              - 'services/payment/**'
              - 'pkg/**'
              - 'gen/**'
            presence:
              - 'services/presence/**'
              - 'pkg/**'
              - 'gen/**'
            notification:
              - 'services/notification/**'
              - 'pkg/**'
              - 'gen/**'

  deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    environment: dev
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        service: [gateway, reservation, billing, payment, presence, notification]
    steps:
      - uses: actions/checkout@v4

      - name: Check if service changed
        id: should-deploy
        run: |
          changed="${{ needs.detect-changes.outputs[matrix.service] }}"
          echo "changed=$changed" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: steps.should-deploy.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.should-deploy.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: steps.should-deploy.outputs.changed == 'true'
        id: build
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}
          TAG=${GITHUB_SHA::8}
          docker build -f services/${{ matrix.service }}/Dockerfile -t $IMAGE:$TAG -t $IMAGE:dev .
          docker push $IMAGE:$TAG
          docker push $IMAGE:dev
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition and deploy
        if: steps.should-deploy.outputs.changed == 'true'
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-dev-${{ matrix.service }} \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "${{ steps.build.outputs.image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-dev-cluster \
            --service ${{ env.PROJECT_NAME }}-dev-${{ matrix.service }} \
            --task-definition $NEW_TASK_ARN \
            --region ${{ env.AWS_REGION }}

          aws ecs wait services-stable \
            --cluster ${{ env.PROJECT_NAME }}-dev-cluster \
            --services ${{ env.PROJECT_NAME }}-dev-${{ matrix.service }} \
            --region ${{ env.AWS_REGION }}

          echo "Deployed ${{ matrix.service }} to dev"
